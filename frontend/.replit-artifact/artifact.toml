kind = "web"
previewPath = "/"
title = "AI Traffic Signal Dashboard"
version = "1.0.0"
id = "artifacts/traffic-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22208

[services.development]
run = "pnpm --filter @workspace/traffic-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/traffic-dashboard", "run", "build" ]
publicDir = "artifacts/traffic-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22208"
BASE_PATH = "/"
